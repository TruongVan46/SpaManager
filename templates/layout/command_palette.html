<!-- templates/layout/command_palette.html -->
<div class="command-palette-overlay" id="command-palette-overlay" style="display: none;">
    <div class="command-palette-container">
        <div class="command-palette-header">
            <div class="command-palette-header-title">
                <i class="bi bi-search"></i>
                <span>Tìm nhanh</span>
            </div>
            <button type="button"
                    class="command-palette-close"
                    data-command-palette-close
                    aria-label="Đóng tìm nhanh"
                    title="Đóng">
                <i class="bi bi-x-lg" aria-hidden="true"></i>
            </button>
        </div>
        <div class="command-palette-search-wrapper">
            <i class="bi bi-search command-palette-search-icon"></i>
            <input type="text" id="command-palette-input" class="command-palette-input" placeholder="Nhập lệnh hoặc tìm kiếm... (Gõ '>' cho Hành động)" autocomplete="off">
            <span class="command-palette-esc-badge">ESC</span>
        </div>
        <div class="command-palette-results" id="command-palette-results">
            <!-- Items rendered dynamically by JS -->
        </div>
        <div class="command-palette-footer">
            <div class="command-palette-footer-item">
                <kbd>↑↓</kbd> Di chuyển
            </div>
            <div class="command-palette-footer-item">
                <kbd>Enter</kbd> Chọn
            </div>
            <div class="command-palette-footer-item">
                <kbd>ESC</kbd> Đóng
            </div>
        </div>
    </div>
</div>
