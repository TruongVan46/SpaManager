<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() if config.get('CSRF_ENABLED') else '' }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Spa Manager{% endblock %}</title>
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/notification.css') }}?v=1.0.5">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}?v=1.0.5">
    
    <style>
        body {
            background-color: var(--color-canvas, var(--color-surface-muted)) !important;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    {% include 'layout/flash.html' %}

    {% block content %}{% endblock %}

    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Notification system -->
    <script src="{{ url_for('static', filename='js/notification.js') }}"></script>
    <script src="{{ url_for('static', filename='js/csrf.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (window._flashMessages && window._flashMessages.length > 0) {
                window._flashMessages.forEach(function (flash) {
                    const type = flash.category;
                    const msg = flash.message;
                    if (type === 'danger' || type === 'error') {
                        Notification.error(msg);
                    } else if (type === 'warning') {
                        Notification.warning(msg);
                    } else if (type === 'info') {
                        Notification.info(msg);
                    } else {
                        Notification.success(msg);
                    }
                });
            }
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
