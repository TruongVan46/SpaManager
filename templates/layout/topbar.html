<header class="topbar">

    <button class="btn d-lg-none me-3 p-0 border-0 topbar-menu-toggle" id="sidebar-toggle" aria-label="Mở menu" title="Mở menu">
        <i class="bi bi-list" aria-hidden="true"></i>
    </button>

    <div class="topbar-left">

        <h2>Xin chào {{ current_user.full_name.split(' ')[-1] if current_user else 'Chủ Spa' }} 👋</h2>

        <span>Chúc bạn một ngày làm việc hiệu quả.</span>

    </div>

    <div class="topbar-right">

        <button type="button"
                class="btn btn-topbar topbar-search-hint d-flex align-items-center gap-2 border-0 shadow-sm"
                data-command-palette-open
                aria-label="Mở tìm nhanh"
                title="Tìm nhanh (Ctrl+K)">
            <i class="bi bi-search"></i>
            <span class="topbar-search-hint-text d-none d-lg-inline">Tìm nhanh</span>
            <kbd class="topbar-search-hint-kbd d-none d-lg-inline">Ctrl K</kbd>
        </button>

        <!-- Theme Switcher Dropdown -->
        <div class="dropdown me-1">
            <button class="btn btn-topbar dropdown-toggle d-flex align-items-center gap-2 border-0 shadow-sm" 
                    id="theme-switcher-btn"
                    type="button" 
                    data-bs-toggle="dropdown" 
                    aria-expanded="false" 
                    style="background: var(--spa-card-bg); border-radius: 12px; padding: 10px 14px; color: var(--spa-text-primary); transition: none !important;">
                <i id="theme-current-icon" class="bi bi-circle-half"></i>
                <span id="theme-current-text" class="d-none d-sm-inline">Tự động</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0" id="theme-menu" style="background: var(--spa-card-bg); border-radius: 12px; margin-top: 15px; border: 1px solid var(--spa-border-color) !important;">
                <li>
                    <button class="dropdown-item py-2 px-3 d-flex align-items-center justify-content-between" type="button" data-theme="light">
                        <span class="d-flex align-items-center gap-2">
                            <i class="bi bi-sun-fill text-warning"></i>
                            <span>Sáng</span>
                        </span>
                        <i class="bi bi-check2 d-none theme-check-icon"></i>
                    </button>
                </li>
                <li>
                    <button class="dropdown-item py-2 px-3 d-flex align-items-center justify-content-between" type="button" data-theme="dark">
                        <span class="d-flex align-items-center gap-2">
                            <i class="bi bi-moon-stars-fill text-primary"></i>
                            <span>Tối</span>
                        </span>
                        <i class="bi bi-check2 d-none theme-check-icon"></i>
                    </button>
                </li>
                <li>
                    <button class="dropdown-item py-2 px-3 d-flex align-items-center justify-content-between" type="button" data-theme="auto">
                        <span class="d-flex align-items-center gap-2">
                            <i class="bi bi-circle-half text-info"></i>
                            <span>Tự động</span>
                        </span>
                        <i class="bi bi-check2 d-none theme-check-icon"></i>
                    </button>
                </li>
            </ul>
        </div>

        <div class="dropdown profile-dropdown">
            <button type="button" class="profile profile-trigger btn" data-bs-toggle="dropdown" aria-expanded="false" aria-haspopup="true" aria-controls="profile-menu" aria-label="Mở menu tài khoản">
                {% set avatar_url = media_url(current_user.avatar, 'avatar') if current_user else None %}
                {% if avatar_url %}
                    <img src="{{ avatar_url }}" alt="Ảnh đại diện" class="rounded-circle" style="width: 32px; height: 32px; object-fit: cover;" loading="lazy">
                {% else %}
                    <i class="bi bi-person-circle" style="font-size: 30px; color: var(--spa-primary, #a67c52);"></i>
                {% endif %}
                <span>{{ current_user.full_name if current_user else 'Chủ Spa' }}</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0" id="profile-menu" style="background: var(--spa-card-bg); border-radius: 12px; margin-top: 15px; border: 1px solid var(--spa-border-color);">
                <li>
                    <a class="dropdown-item py-2 px-3 d-flex align-items-center gap-2" href="{{ url_for('auth.profile') }}">
                        <i class="bi bi-person-circle" style="color: var(--spa-primary, #a67c52);"></i>
                        <span>Hồ sơ cá nhân</span>
                    </a>
                </li>
                <li>
                    <a class="dropdown-item py-2 px-3 d-flex align-items-center gap-2" href="#" data-bs-toggle="modal" data-bs-target="#changePasswordModal">
                        <i class="bi bi-shield-lock" style="color: var(--spa-primary, #a67c52);"></i>
                        <span>Đổi mật khẩu</span>
                    </a>
                </li>
                <li><hr class="dropdown-divider" style="opacity: 0.08;"></li>
                <li>
                    <form action="{{ url_for('auth.logout') }}" method="post" class="m-0">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="dropdown-item py-2 px-3 d-flex align-items-center gap-2 text-danger w-100">
                            <i class="bi bi-box-arrow-right"></i>
                            <span>Đăng xuất</span>
                        </button>
                    </form>
                </li>
            </ul>
        </div>

    </div>

</header>
