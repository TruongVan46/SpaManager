{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <script id="flash-messages-data" type="application/json">
      [
        {% for category, message in messages %}
          {
            "category": {{ category|tojson }},
            "message": {{ message|tojson }}
          }{% if not loop.last %},{% endif %}
        {% endfor %}
      ]
    </script>
    <script>
      (function() {
        const dataEl = document.getElementById('flash-messages-data');
        if (dataEl) {
          try {
            const messages = JSON.parse(dataEl.textContent);
            window._flashMessages = window._flashMessages || [];
            window._flashMessages.push(...messages);
          } catch (e) {
            console.error('Error parsing flash messages data:', e);
          }
        }
      })();
    </script>
  {% endif %}
{% endwith %}
