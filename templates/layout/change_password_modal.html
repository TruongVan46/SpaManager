<!-- templates/layout/change_password_modal.html -->
<div class="modal fade app-core-modal" id="changePasswordModal" tabindex="-1" aria-labelledby="changePasswordModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content app-core-modal-content border-0 shadow-lg" style="border-radius: 14px;">
            <div class="modal-header border-bottom-0 pb-0">
                <h5 class="modal-title fw-bold text-primary" id="changePasswordModalLabel">
                    <i class="bi bi-shield-lock-fill me-2"></i>Đổi mật khẩu tài khoản
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
            </div>
            <div class="modal-body pt-3">
                <form id="change-password-form" method="post" class="app-core-form" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <!-- Current Password -->
                    <div class="mb-3">
                        <label for="current_password" class="form-label fw-semibold">Mật khẩu hiện tại</label>
                        <div class="input-group">
                            <span class="input-group-text app-bg-card border-end-0"><i class="bi bi-key text-muted"></i></span>
                            <input type="password" id="current_password" class="form-control app-form-control border-start-0 border-end-0 ps-0" placeholder="Nhập mật khẩu cũ" required>
                            <button class="btn btn-outline-secondary border-start-0 toggle-password-visibility" type="button" data-target="current_password" style="border: 1px solid #ced4da; border-radius: 0 8px 8px 0;">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- New Password -->
                    <div class="mb-3">
                        <label for="new_password" class="form-label fw-semibold">Mật khẩu mới</label>
                        <div class="input-group">
                            <span class="input-group-text app-bg-card border-end-0"><i class="bi bi-shield-slash text-muted"></i></span>
                            <input type="password" id="new_password" class="form-control app-form-control border-start-0 border-end-0 ps-0" placeholder="Ít nhất 8 ký tự" required>
                            <button class="btn btn-outline-secondary border-start-0 toggle-password-visibility" type="button" data-target="new_password" style="border: 1px solid #ced4da; border-radius: 0 8px 8px 0;">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label fw-semibold">Xác nhận mật khẩu mới</label>
                        <div class="input-group">
                            <span class="input-group-text app-bg-card border-end-0"><i class="bi bi-shield-check text-muted"></i></span>
                            <input type="password" id="confirm_password" class="form-control app-form-control border-start-0 border-end-0 ps-0" placeholder="Nhập lại mật khẩu mới" required>
                            <button class="btn btn-outline-secondary border-start-0 toggle-password-visibility" type="button" data-target="confirm_password" style="border: 1px solid #ced4da; border-radius: 0 8px 8px 0;">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="d-flex gap-2 justify-content-end">
                        <button type="button" class="btn btn-outline-secondary py-2 px-4" data-bs-dismiss="modal" id="btn-cancel-change-password">Hủy</button>
                        <button type="submit" class="btn btn-primary app-btn-primary py-2 px-4" id="btn-submit-change-password">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Toggle password visibility helper
        const toggleButtons = document.querySelectorAll('.toggle-password-visibility');
        toggleButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const targetInput = document.getElementById(targetId);
                const icon = this.querySelector('i');
                
                if (targetInput.type === 'password') {
                    targetInput.type = 'text';
                    icon.classList.remove('bi-eye');
                    icon.classList.add('bi-eye-slash');
                } else {
                    targetInput.type = 'password';
                    icon.classList.remove('bi-eye-slash');
                    icon.classList.add('bi-eye');
                }
            });
        });

        // Submit form handler
        const form = document.getElementById('change-password-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const currentPassword = document.getElementById('current_password').value;
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            // 1. Client-side validation
            if (!currentPassword || !newPassword || !confirmPassword) {
                Notification.error("Vui lòng điền đầy đủ các thông tin yêu cầu.");
                return;
            }

            if (newPassword.length < 8) {
                Notification.error("Mật khẩu mới phải chứa ít nhất 8 ký tự.");
                return;
            }

            if (newPassword !== confirmPassword) {
                Notification.error("Mật khẩu xác nhận không khớp.");
                return;
            }

            if (currentPassword === newPassword) {
                Notification.error("Mật khẩu mới không được trùng mật khẩu cũ.");
                return;
            }

            // UI feedback states
            const submitBtn = document.getElementById('btn-submit-change-password');
            const cancelBtn = document.getElementById('btn-cancel-change-password');
            const originalBtnHtml = submitBtn.innerHTML;

            submitBtn.disabled = true;
            cancelBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span> Đang lưu...';

            // Send to server
            csrfFetch("{{ url_for('auth.change_password') }}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-Requested-With": "XMLHttpRequest"
                },
                body: JSON.stringify({
                    current_password: currentPassword,
                    new_password: newPassword,
                    confirm_password: confirmPassword
                })
            })
            .then(res => res.json())
            .then(data => {
                // Restore button states
                submitBtn.disabled = false;
                cancelBtn.disabled = false;
                submitBtn.innerHTML = originalBtnHtml;

                if (data.success) {
                    Notification.success(data.message || "Đổi mật khẩu thành công!");
                    Notification.info("Nếu đây không phải thao tác của bạn, hãy đổi mật khẩu ngay.");
                    
                    // Reset form and close modal
                    form.reset();
                    const modalEl = document.getElementById('changePasswordModal');
                    const modal = bootstrap.Modal.getInstance(modalEl);
                    if (modal) modal.hide();
                } else {
                    Notification.error(data.message || "Không thể đổi mật khẩu.");
                }
            })
            .catch(err => {
                console.error(err);
                submitBtn.disabled = false;
                cancelBtn.disabled = false;
                submitBtn.innerHTML = originalBtnHtml;
                Notification.error("Không thể đổi mật khẩu.");
            });
        });
    });
</script>
