{% extends "layout/base.html" %}

{% block title %}403 - Không có quyền truy cập{% endblock %}

{% block content %}
<div class="container-fluid app-page text-center py-5">
    <div class="fs-1 text-danger mb-3"><i class="bi bi-shield-lock-fill"></i> 403</div>
    <h2 class="app-title mb-4">Không có quyền truy cập!</h2>
    <p class="app-text lead text-muted">{{ message or 'Bạn không có quyền truy cập khu vực này.' }}</p>
    <div class="mt-4">
        <a href="{{ url_for('dashboard.index') }}" class="app-btn app-btn-primary btn btn-primary">
            <i class="bi bi-arrow-left" style="margin-right: 8px;"></i>Quay lại Trang chủ
        </a>
    </div>
</div>
{% endblock %}
